<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="./intro.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans+Flex:opsz,wght@6..144,1..1000&display=swap" rel="stylesheet"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <title>Myntra Login</title>
</head>
<body>
    <nav id="navbar">
        <div class="left">
            <img src="./assets/logo.png" alt="">

            <div class="category">
                <ul>
                    <li class="men"><a href="">men</a></li>
                    <li class="women"><a href="">women</a></li>
                    <li class="kids"><a href="">kids</a></li>
                    <li class="home"><a href="">home</a></li>
                    <li class="beauty"><a href="">beauty</a></li>
                    <li class="genz"><a href="">genz</a></li>
                    <li class="studio"><a href="">studio</a></li>
                </ul>
            </div>
        </div>

        <div class="right">
            <div class="mglass">
                <a href=""><i class="fa-solid fa-magnifying-glass"></i></a>
            </div>
            <div class="search">
                <input type="text" placeholder="Search for Products, Brands and more">
            </div>

            <div class="shop">
                <a href="">
                    <i class="fa-regular fa-heart"></i>
                </a>
                <a href="">
                    <i class="fa-solid fa-bag-shopping"></i>
                </a>
            </div>
        </div>
    </nav>
    <div class="box">

        <img src="./assets/logo.png" alt="">

        <div class="text">
            <h1>
                <span class="be">BE </span>
                <span class="extra">xtraordinary </span>
                <span class="alpha-e">E</span>
                <span class="very">very </span>
                <span class="day">Day</span>
            </h1>
        </div>
    </div>

    <div class="block">
        <p class="head"><span>Login </span>or<span> Signup</span></p>

        <div class="telnum">
            <input type="text" placeholder="Mobile Number">
        </div>

        <div class="rules">
            <input type="checkbox" id="check">
            <label for="">By continuing, I agree to the <span>Terms of Use</span> & <span>Privacy Policy</span> and I am above 18 years old.</label>
            <button class="btn">Continue</button>
        </div>

        <p class="help">Have trouble logging in? <span>Get help</span></p>
    </div>
</body>
</html>
